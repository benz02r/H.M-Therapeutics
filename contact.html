<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://www.hmtherapeutics.com/contact.html">
    <meta name="description" content="Contact HM Therapeutics for professional massage therapy and holistic healing solutions.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM Therapeutics - Contact</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <img src="images/logo.png" alt="HM Therapeutics Logo" class="logo">
        <nav class="main-nav">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <section class="contact-section">
        <h2>Contact Us</h2>
        <div class="contact-box">
            <form id="contactForm" action="https://formspree.io/f/mzbnwvav" method="POST">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <input type="tel" id="phone" name="phone" placeholder="Your Phone">
                <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                <button type="submit" class="cta-button">Submit</button>
                <p id="form-message"></p>
            </form>
        </div>

        <!-- Map Box -->
        <div class="map-box">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2424.7744695219185!2d-2.1303776233156055!3d52.57368967207534!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x48709bd1eef79f6d%3A0x1184097c0c649f26!2sH.M%20Therapeutics!5e0!3m2!1sen!2suk!4v1732120674006!5m2!1sen!2suk" 
                style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 HM Therapeutics. All rights reserved.</p>
            <nav class="footer-nav">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </footer>

    <script src="script.js" defer></script>

</body>
</html>
